# Snippet pour le bloc qui fait proxy_pass vers Next.js (ex. http://127.0.0.1:3000).
# Erreur Nginx corrigée : "upstream sent too big header while reading response header from upstream"
#
# Inclure dans server { } ou dans location /, après proxy_pass :
#   include /chemin/vers/nginx-nextjs-proxy-buffers.conf;
# ou copier-coller les directives dans le même bloc.

proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;

# Si des requêtes échouent encore avec des cookies JWT très longs (en-têtes client) :
# large_client_header_buffers 4 32k;
